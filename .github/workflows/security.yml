name: Security Analysis

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: '0 1 * * *' # At 01:00 every day
  workflow_dispatch: # manual trigger

permissions:
  contents: read
  security-events: write

jobs:
  CodeQL:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # https://github.com/actions/checkout/releases/tag/v6.0.2
      - uses: github/codeql-action/init@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # https://github.com/github/codeql-action/releases/tag/v4.35.2
        with:
          languages: javascript
      - uses: github/codeql-action/analyze@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # https://github.com/github/codeql-action/releases/tag/v4.35.2

  npm:
    uses: ./.github/workflows/npm.yml

  npm-audit:
    runs-on: ubuntu-latest
    needs: npm
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # https://github.com/actions/checkout/releases/tag/v6.0.2
      - run: npm audit --audit-level=high
